<style>

<script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>
<script>
let bingoCardContainer = document.querySelector('.bingo-card-container')
let bingoSquares = document.querySelectorAll('.bingo-square:not(.free-square)');
let modalCloseBtn = document.querySelector('#modal-close')


// Data items
let bingoSquareOptions = [
'Audio issues',
'Bridemaid(s) cry',
'Bridesmaid dances barefoot',
'Dad cries during Father / Daughter dance',
'Dance competition breaks out',
'Dennis brings up his ex-girlfriend(s)',
'DJ plays cha-cha slide song',
'Grito laugh',
'Kelly falls on the dance floor',
'Maid of honor 5+ minute speech',
'Mom cries during Mother / Son dance',
'Noah gets a girl\'s number',
'Notification / ringing during ceremony',
'Ryan gets a girl\'s number',
'Ryan gets distracted during speech',
'Shots / chugging',
'Soccer pose for photo',
'Someone comments about how hot it is',
'Someone complains about the food',
'Someone gets drunk',
'Someone leaves early',
'Someone mentions President Trump',
'Someone rags on Liverpool FC',
'Someone spills a drink',
'Someone throws up',
'Someone tries to swap dinner tables',
'Use of illicit substances (any drug)',
'Using program / paper as a fan',
'Wardrobe malfunction'
]

// Helper function to get random number
const getRandomInt = (max) => {
  return Math.floor(Math.random() * max);
}


// Checks for square data in localStorage, if they exist then add the text to the squares, and if selected then add class
// If nothing in localStorage then randomize text for first time and save to localStorage
const sortBingoSquareOptions = () => {  
  if (!!localStorage.getItem('squareData0')) {
    bingoSquares.forEach((bingoSquare, index) => {
      bingoSquare.textContent = localStorage.getItem(`squareData${index}`);
      if (localStorage.getItem(`squareData${index}selected`)) {
        bingoSquare.classList.add('selected')
      }
    })
  } else {
    bingoSquares.forEach((bingoSquare, index) => {
      let randomArrIndex = getRandomInt(bingoSquareOptions.length);
      let squareText = bingoSquareOptions[randomArrIndex];
      
      // Set bingo square content, save content into localStorage, and then remove from array so we can get new random square data
      bingoSquare.textContent = squareText;
      localStorage.setItem(`squareData${index}`, squareText);
      bingoSquareOptions.splice(randomArrIndex, 1);
    })
  }
}
sortBingoSquareOptions()


// Winning particles animation
const fireworksStart = () => {
  const duration = 5 * 1000;
  const animationEnd = Date.now() + duration;
  const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
  const randomInRange = (min, max) => {
    return Math.random() * (max - min) + min;
  }
  const interval = setInterval(function() {
    const timeLeft = animationEnd - Date.now();

    if (timeLeft <= 0) {
      return clearInterval(interval);
    }

    const particleCount = 50 * (timeLeft / duration);

    // since particles fall down, start a bit higher than random
    confetti(
      Object.assign({}, defaults, {
        particleCount,
        origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
      })
    );
    confetti(
      Object.assign({}, defaults, {
        particleCount,
        origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
      })
    );
  }, 250);
}


// Winning paths
const winningPaths = [
  [0,1,2,3,4], //1st row
  [5,6,7,8,9], //2nd row
  [10,11,12,13], //3rd row with free space
  [14,15,16,17,18], //4th row
  [19,20,21,22,23], //5th row
  [0,6,17,23], //diagonal top left to bot right
  [4,8,15,19], //diagonal top right to bot left
  [0,5,10,14,19], //1st column
  [1,6,11,15,20], //2nd column
  [2,7,16,21], //3rd column
  [3,8,12,17,22], //4th column
  [4,9,13,18,23] //5th column
]
// Check if any of the winning paths were triggered
const winCheck = () => {
  winningPaths.forEach((winningPathArr) => {
    let win = true;
    winningPathArr.forEach((index) => {
      if (!localStorage.getItem(`squareData${index}selected`)) {
        win = false;
      }
    })
    if (!!win) {
      bingoCardContainer.classList.add('game-over')
      fireworksStart()
    }
  })
}

// Click listener, if selected then add class and save into localStorage to rememeber upon reload
bingoSquares.forEach((bingoSquare) => {
  bingoSquare.addEventListener('click', () => {
    let index = Array.from(bingoSquares).indexOf(bingoSquare)
    if (!bingoSquare.classList.contains('selected')) {
      bingoSquare.classList.add('selected');
      localStorage.setItem(`squareData${index}selected`, 'true');
    } else {
      bingoSquare.classList.remove('selected');
      localStorage.removeItem(`squareData${index}selected`);
    }
    
    // Check winning paths function
    winCheck()
  });
});


// Modal close listener
modalCloseBtn.addEventListener('click', () => {
  bingoCardContainer.classList.remove('game-over')
})
</script>
